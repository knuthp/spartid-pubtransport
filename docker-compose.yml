services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    restart: always
    environment:
      - DB_CONN=prod
    depends_on:
      - db

  poller:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.poller
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://postgres:postgres@db:5432/spartid_pubtransport
    depends_on:
      - db

  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=spartid_pubtransport
    ports:
      - '9202:5432'
    volumes:
      - db:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    volumes:
      - api-data:/app/data
    depends_on:
      - db

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: always
    ports:
      - "9102:80"
    volumes:
      - ./static:/srv
    depends_on:
      - streamlit
      - api
volumes:
  db:
    driver: local
  api-data:
    driver: local