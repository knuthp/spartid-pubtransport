<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicle Positions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.1.3/maplibre-gl.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.1.3/maplibre-gl.min.css" />
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
    #map { width: 100%; height: 100%; }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(15, 15, 30, 0.88);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      color: #e0e0f0;
      font-size: 13px;
      min-width: 220px;
      backdrop-filter: blur(6px);
      pointer-events: none;
    }
    #hud h2 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #a0c4ff; letter-spacing: 0.04em; }
    #hud .stat { display: flex; justify-content: space-between; gap: 24px; margin-bottom: 4px; }
    #hud .stat span:last-child { color: #fff; font-weight: 600; }
    #hud .updated { margin-top: 8px; font-size: 11px; color: #888; }
    #hud .legend { margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
    #hud .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 2px; }
    #hud .dot { width: 8px; height: 8px; border-radius: 50%; }

    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(15, 15, 30, 0.92);
      border: 1px solid rgba(160, 196, 255, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0f0;
      font-size: 13px;
      display: none;
      max-width: 240px;
      backdrop-filter: blur(6px);
    }
    #tooltip .tline { font-size: 18px; font-weight: 700; color: #a0c4ff; margin-bottom: 4px; }
    #tooltip .trow { margin: 2px 0; font-size: 12px; color: #aaa; }
    #tooltip .trow span { color: #e0e0f0; }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    #controls button {
      background: rgba(15,15,30,0.88);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #a0c4ff;
      font-size: 13px;
      padding: 8px 18px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
    }
    #controls button:hover { background: rgba(40,40,80,0.95); }
    #controls button.active { background: rgba(60,80,160,0.9); color: #fff; border-color: #a0c4ff; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="hud">
    <h2>🚌 Vehicle Positions</h2>
    <div class="stat"><span>Interpolated (ET)</span><span id="stat-count-et">—</span></div>
    <div class="stat"><span>Real-time (VM)</span><span id="stat-count-vm">—</span></div>
    <div class="stat"><span>Lines</span><span id="stat-lines">—</span></div>
    <div class="updated" id="stat-time">Loading…</div>
    <div class="legend">
      <div class="legend-item"><div class="dot" style="background: #3a86ff;"></div> <span>Interpolated (Estimated)</span></div>
      <div class="legend-item"><div class="dot" style="background: #00ff88;"></div> <span>Real-time (Vehicle Monitoring)</span></div>
    </div>
  </div>

  <div id="tooltip"></div>

  <div id="controls">
    <button id="btn-refresh" onclick="loadData()">⟳ Refresh</button>
    <button id="btn-auto" class="active" onclick="toggleAuto()">⏸ Auto (3s)</button>
  </div>

  <script>
    let dataET = [];
    let dataVM = [];
    let selectedTrip = null;

    const ET_GEOJSON_URL = "/api/positions_interpolated.geojson";
    const VM_GEOJSON_URL = "/api/positions_vm.geojson";
    const REFRESH_INTERVAL = 3000;

    // --- SVG icon atlas ---
    const ICON_SIZE = 64;
    const MODES = ['bus', 'tram', 'subway', 'rail', 'ferry', 'unknown'];

    const MODE_ICONS = {
      bus: "🚌",
      tram: "🚃",
      subway: "🚇",
      rail: "🚆",
      ferry: "⛴️",
      unknown: "⚪"
    };

    function buildIconAtlas() {
      const canvas = document.createElement("canvas");
      canvas.width = ICON_SIZE * MODES.length;
      canvas.height = ICON_SIZE * 2;
      const ctx = canvas.getContext("2d");
      const mapping = {};

      MODES.forEach((mode, i) => {
        // ET Row (Blue) - Index 0
        const x_et = i * ICON_SIZE;
        const y_et = 0;
        drawEmojiIcon(ctx, x_et, y_et, ICON_SIZE, "#3a86ff", MODE_ICONS[mode]);
        mapping[`${mode}_et`] = { x: x_et, y: y_et, width: ICON_SIZE, height: ICON_SIZE, anchorY: ICON_SIZE };

        // VM Row (Green) - Index 1
        const x_vm = i * ICON_SIZE;
        const y_vm = ICON_SIZE;
        drawEmojiIcon(ctx, x_vm, y_vm, ICON_SIZE, "#00ff88", MODE_ICONS[mode]);
        mapping[`${mode}_vm`] = { x: x_vm, y: y_vm, width: ICON_SIZE, height: ICON_SIZE, anchorY: ICON_SIZE };
      });

      return { url: canvas.toDataURL(), mapping };
    }

    function drawEmojiIcon(ctx, x, y, size, color, emoji) {
      // Draw background circle
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x + size/2, y + size/2, size/2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Draw border
      ctx.strokeStyle = "rgba(0,0,0,0.2)";
      ctx.lineWidth = 2;
      ctx.stroke();

      // Draw Emoji
      ctx.font = `${size * 0.6}px serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(emoji, x + size/2, y + size/2 + size * 0.05);
    }

    const iconAtlas = buildIconAtlas();

    // --- MapLibre setup ---
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          osm: {
            type: "raster",
            tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
            tileSize: 256,
            attribution: "© OpenStreetMap contributors"
          }
        },
        layers: [{ id: "osm", type: "raster", source: "osm" }]
      },
      center: [10.75, 59.91],  // Oslo
      zoom: 10,
      attributionControl: { compact: true }
    });

    const deckOverlay = new deck.MapboxOverlay({ layers: [] });
    map.addControl(deckOverlay);

    let autoTimer = setInterval(loadData, REFRESH_INTERVAL);

    async function loadData() {
      const btn = document.getElementById("btn-refresh");
      btn.textContent = "⟳ Loading…";

      try {
        const [resET, resVM] = await Promise.all([
          fetch(ET_GEOJSON_URL + "?t=" + Date.now()),
          fetch(VM_GEOJSON_URL + "?t=" + Date.now())
        ]);

        if (resET.ok) {
          const geojsonET = await resET.json();
          dataET = (geojsonET.features || []).map(f => ({
            ...f.properties,
            coordinates: f.geometry.coordinates,
            source: 'ET'
          }));
        }

        if (resVM.ok) {
          const rawVM = await resVM.json();
          const geojsonVM = typeof rawVM === 'string' ? JSON.parse(rawVM) : rawVM;
          dataVM = (geojsonVM.features || []).map(f => ({
            ...f.properties,
            coordinates: f.geometry.coordinates,
            source: 'VM'
          }));
        }

        render();
        updateHud();
      } catch (e) {
        console.error("Failed to load positions:", e);
        document.getElementById("stat-time").textContent = "Error: " + e.message;
      }
      btn.textContent = "⟳ Refresh";
    }

    function getVehicleIcon(d, isVM) {
      let mode = isVM ? (d.VehicleMode || 'unknown') : (d.vehicle_mode || 'unknown');
      mode = mode.toLowerCase();
      // Handle potential variations
      if (mode.includes('bus')) mode = 'bus';
      else if (mode.includes('tram')) mode = 'tram';
      else if (mode.includes('subway') || mode.includes('metro')) mode = 'subway';
      else if (mode.includes('rail') || mode.includes('train')) mode = 'rail';
      else if (mode.includes('ferry') || mode.includes('water')) mode = 'ferry';

      if (!MODES.includes(mode)) mode = 'unknown';
      return `${mode}_${isVM ? 'vm' : 'et'}`;
    }

    function render() {
      const layers = [
        new deck.GeoJsonLayer({
          id: "selected-trip",
          data: selectedTrip,
          getLineWidth: 4,
          getLineColor: [255, 255, 0, 200],
          getPointRadius: 5,
          getFillColor: [255, 255, 0, 255],
          pointRadiusUnits: "pixels",
          lineWidthUnits: "pixels",
          pickable: true,
          onHover: info => {
            if (info.object && info.object.properties.type === "trip_stop") {
              handleStopHover(info);
            } else {
              handleHover(info);
            }
          }
        }),
        new deck.IconLayer({
          id: "vehicles-et",
          data: dataET,
          iconAtlas: iconAtlas.url,
          iconMapping: iconAtlas.mapping,
          getIcon: d => getVehicleIcon(d, false),
          getPosition: d => d.coordinates,
          getSize: 40,
          pickable: true,
          onHover: handleHover,
          onClick: handleClick
        }),
        new deck.IconLayer({
          id: "vehicles-vm",
          data: dataVM,
          iconAtlas: iconAtlas.url,
          iconMapping: iconAtlas.mapping,
          getIcon: d => getVehicleIcon(d, true),
          getPosition: d => d.coordinates,
          getSize: 45,
          pickable: true,
          onHover: handleHover,
          onClick: handleClick
        }),
        new deck.TextLayer({
          id: "vehicles-text",
          data: [...dataET, ...dataVM],
          getPosition: d => d.coordinates,
          getText: d => d.line_name || d.PublishedLineName || "",
          getSize: 12,
          getColor: [255, 255, 255, 220],
          getPixelOffset: [0, -28],
          fontWeight: "bold",
          background: true,
          getBackgroundColor: [30, 30, 60, 200],
          backgroundPadding: [3, 2, 3, 2],
          getBorderRadius: 4,
          pickable: false
        })
      ];

      deckOverlay.setProps({ layers });
    }

    function updateHud() {
      const lines = new Set([
        ...dataET.map(d => d.line_ref),
        ...dataVM.map(d => d.LineRef)
      ].filter(Boolean));

      document.getElementById("stat-count-et").textContent = dataET.length.toLocaleString();
      document.getElementById("stat-count-vm").textContent = dataVM.length.toLocaleString();
      document.getElementById("stat-lines").textContent = lines.size.toLocaleString();
      document.getElementById("stat-time").textContent =
        "Updated " + new Date().toLocaleTimeString();
    }

    const tooltip = document.getElementById("tooltip");

    async function handleClick({ object }) {
      if (!object) {
        selectedTrip = null;
        render();
        return;
      }

      const tripId = object.source === 'VM' ? object.DatedVehicleJourneyRef : object.journey_ref;
      if (!tripId) return;

      try {
        const res = await fetch(`/api/trip/${tripId}/details`);
        if (res.ok) {
          selectedTrip = await res.json();
          render();
        } else {
          console.error("Failed to fetch trip details:", await res.text());
        }
      } catch (e) {
        console.error("Error fetching trip details:", e);
      }
    }

    function handleStopHover({ object, x, y }) {
      if (!object) { tooltip.style.display = "none"; return; }
      tooltip.innerHTML = `
        <div class="tline">${object.properties.stop_name}</div>
        <div class="trow">Sequence: <span>${object.properties.stop_sequence}</span></div>
      `;
      tooltip.style.display = "block";
      tooltip.style.left = (x + 14) + "px";
      tooltip.style.top = (y - 10) + "px";
    }

    function handleHover({ object, x, y }) {
      if (!object || object.properties) { // Skip if it's a GeoJSON feature (unless we want to handle shape hover)
        if (!object) tooltip.style.display = "none";
        return;
      }

      const isVM = object.source === 'VM';
      const lineName = isVM ? object.PublishedLineName : object.line_name;
      const lineRef = isVM ? object.LineRef : object.line_ref;
      const journeyRef = isVM ? object.DatedVehicleJourneyRef : object.journey_ref;
      const vehicleRef = isVM ? object.VehicleRef : object.vehicle_ref;
      const status = isVM ? object.VehicleStatus : object.status;
      const recordedAt = isVM ? object.RecordedAtTime : object.estimated_at;
      const mode = isVM ? object.VehicleMode : object.vehicle_mode;

      const age = recordedAt ? formatAge(recordedAt) : "unknown";

      tooltip.innerHTML = `
        <div class="tline">${lineName || lineRef || "—"}</div>
        <div class="trow">Mode: <span style="text-transform: capitalize;">${mode || "—"}</span></div>
        <div class="trow">Source: <span style="color: ${isVM ? '#00ff88' : '#3a86ff'}">${isVM ? 'Real-time (VM)' : 'Interpolated (ET)'}</span></div>
        <div class="trow">Journey: <span>${journeyRef || "—"}</span></div>
        <div class="trow">Line ref: <span>${lineRef || "—"}</span></div>
        <div class="trow">Vehicle ref: <span>${vehicleRef || "—"}</span></div>
        <div class="trow">Status: <span>${status || "—"}</span></div>
        ${!isVM ? `<div class="trow">Stop: <span>${object.stop_name || "—"}</span></div>` : ''}
        ${!isVM ? `<div class="trow">Next Stop: <span>${object.next_stop_name || "—"}</span></div>` : ''}
        <div class="trow">Recorded/Est: <span>${recordedAt || "—"}</span></div>
        <div class="trow">Updated: <span>${age}</span></div>
      `;
      tooltip.style.display = "block";
      tooltip.style.left = (x + 14) + "px";
      tooltip.style.top = (y - 10) + "px";
    }

    function formatAge(isoStr) {
      const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
      if (diff < 60) return diff + "s ago";
      if (diff < 3600) return Math.floor(diff / 60) + "m ago";
      return Math.floor(diff / 3600) + "h ago";
    }

    function toggleAuto() {
      const btn = document.getElementById("btn-auto");
      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
        btn.textContent = "▶ Auto (3s)";
        btn.classList.remove("active");
      } else {
        autoTimer = setInterval(loadData, REFRESH_INTERVAL);
        btn.textContent = "⏸ Auto (3s)";
        btn.classList.add("active");
      }
    }

    map.on("load", loadData);
    map.on("click", () => {
      selectedTrip = null;
      render();
    });
  </script>
</body>
</html>
